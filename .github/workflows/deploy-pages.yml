name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime config.json from secrets
        shell: bash
        run: |
          cat > config.js <<EOF
          // Generated at deploy time by GitHub Actions.
          window.CONFIG = {
            "firebase": {
              "apiKey": "${{ secrets.FIREBASE_API_KEY }}",
              "authDomain": "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
              "databaseURL": "${{ secrets.FIREBASE_DATABASE_URL }}",
              "projectId": "${{ secrets.FIREBASE_PROJECT_ID }}",
              "storageBucket": "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
              "messagingSenderId": "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
              "appId": "${{ secrets.FIREBASE_APP_ID }}"
            },
            "filebase": {
              "apiKey": "${{ secrets.FILEBASE_API_KEY }}",
              "apiSecret": "${{ secrets.FILEBASE_API_SECRET }}",
              "bucketName": "${{ secrets.FILEBASE_BUCKET_NAME }}",
              "region": "${{ secrets.FILEBASE_REGION }}",
              "endpoint": "s3.filebase.com"
            }
          };
          EOF

          cat > config.json <<EOF
          {
            "firebase": {
              "apiKey": "${{ secrets.FIREBASE_API_KEY }}",
              "authDomain": "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
              "databaseURL": "${{ secrets.FIREBASE_DATABASE_URL }}",
              "projectId": "${{ secrets.FIREBASE_PROJECT_ID }}",
              "storageBucket": "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
              "messagingSenderId": "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
              "appId": "${{ secrets.FIREBASE_APP_ID }}"
            },
            "filebase": {
              "apiKey": "${{ secrets.FILEBASE_API_KEY }}",
              "apiSecret": "${{ secrets.FILEBASE_API_SECRET }}",
              "bucketName": "${{ secrets.FILEBASE_BUCKET_NAME }}",
              "region": "${{ secrets.FILEBASE_REGION }}",
              "endpoint": "s3.filebase.com"
            }
          }
          EOF

          cp config.js app-config.js
          cp config.json app-config.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verify generated config artifacts
        shell: bash
        run: |
          ls -la config.js config.json app-config.js app-config.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
